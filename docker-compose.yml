# Archilume multi-container orchestration
# Usage:
#   docker compose up -d              # start both services
#   docker compose up -d --build      # rebuild and start
#   docker compose down               # stop (project data stays in ./projects/)

services:
  archilume-app:
    build:
      context: .
      target: archilume-app
    ports:
      - "3000:3000"
      - "8000:8000"
    volumes:
      - ./projects:/app/projects
    environment:
      - API_URL=http://localhost:8000
    depends_on:
      archilume-engine:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
    restart: unless-stopped

  archilume-engine:
    build:
      context: .
      target: archilume-engine
    ports:
      - "8100:8100"
    volumes:
      - ./projects:/app/projects
    environment:
      - RADIANCE_ROOT=/usr/local/radiance
      - ACCELERAD_ROOT=/usr/local/accelerad
      - RAYPATH=/usr/local/accelerad/lib:/usr/local/radiance/lib
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "4"
    restart: unless-stopped
